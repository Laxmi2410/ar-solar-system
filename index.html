<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
<a-scene embedded arjs>

  <a-marker preset="hiro">

    <!-- Sun -->
    <a-sphere position="0 0 0" radius="0.5" color="yellow"></a-sphere>

    <!-- Mercury -->
    <a-sphere position="0.8 0 0" radius="0.1" color="gray"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-sphere>

    <!-- Venus -->
    <a-sphere position="1.2 0 0" radius="0.15" color="orange"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-sphere>

    <!-- Earth -->
    <a-sphere position="1.6 0 0" radius="0.2" color="blue"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-sphere>

    <!-- Mars -->
    <a-sphere position="2 0 0" radius="0.18" color="red"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 6000"></a-sphere>

    <!-- Jupiter -->
    <a-sphere position="2.6 0 0" radius="0.35" color="brown"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 7000"></a-sphere>

    <!-- Saturn -->
    <a-sphere position="3.3 0 0" radius="0.3" color="#d2b48c"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000"></a-sphere>

    <!-- Saturn Ring -->
    <a-ring position="3.3 0 0" radius-inner="0.35" radius-outer="0.5"
      rotation="90 0 0" color="gray"></a-ring>

    <!-- Uranus -->
    <a-sphere position="4 0 0" radius="0.25" color="lightblue"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-sphere>

    <!-- Neptune -->
    <a-sphere position="4.6 0 0" radius="0.25" color="darkblue"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000"></a-sphere>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>
</body>
</html>
